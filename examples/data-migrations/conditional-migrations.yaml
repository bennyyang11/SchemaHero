# Business rule conditional migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: subscription-upgrade-logic
spec:
  database: billing
  name: subscriptions
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: user_id
          type: integer
        - name: plan_type
          type: varchar(20)
        - name: monthly_usage
          type: integer
        - name: plan_limit
          type: integer
        - name: upgrade_recommended
          type: boolean
        - name: auto_upgrade_eligible
          type: boolean
        - name: last_evaluated_at
          type: timestamp
  dataMigrations:
    - name: recommend-upgrades
      description: "Recommend upgrades only for users exceeding 80% of plan limits"
      sql: |
        UPDATE subscriptions 
        SET upgrade_recommended = true,
            last_evaluated_at = NOW()
        WHERE monthly_usage > (plan_limit * 0.8)
          AND plan_type != 'unlimited'
          AND upgrade_recommended IS NOT TRUE
      conditions:
        - query: "SELECT COUNT(*) FROM subscriptions WHERE monthly_usage > (plan_limit * 0.8) AND plan_type != 'unlimited'"
          operator: ">"
          value: 5  # Only run if there are users near limits
        - query: "SELECT AVG(monthly_usage::float / plan_limit) FROM subscriptions WHERE plan_limit > 0"
          operator: ">"
          value: 50  # Only run if average usage is above 50%
      type: TRANSFORM
      batchSize: 2000

    - name: mark-auto-upgrade-eligible
      description: "Mark users eligible for auto-upgrade based on usage patterns"
      sql: |
        UPDATE subscriptions 
        SET auto_upgrade_eligible = true
        WHERE upgrade_recommended = true
          AND monthly_usage > plan_limit  -- Actually exceeding limits
          AND plan_type IN ('basic', 'standard')  -- Only certain plans auto-upgrade
          AND auto_upgrade_eligible IS NOT TRUE
      conditions:
        - query: "SELECT COUNT(*) FROM subscriptions WHERE upgrade_recommended = true AND monthly_usage > plan_limit"
          operator: ">"
          value: 0
        - query: "SELECT COUNT(*) FROM subscriptions WHERE auto_upgrade_eligible = true"
          operator: "<"
          value: 1000  # Don't auto-upgrade too many at once
      dependsOn: ["recommend-upgrades"]
      type: TRANSFORM
      batchSize: 500

---
# Time-based conditional migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: audit-log-retention
spec:
  database: audit
  name: audit_logs
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: user_id
          type: integer
        - name: action
          type: varchar(100)
        - name: created_at
          type: timestamp
        - name: log_level
          type: varchar(10)
        - name: archived
          type: boolean
        - name: purge_eligible
          type: boolean
  dataMigrations:
    - name: archive-old-info-logs
      description: "Archive INFO logs older than 90 days, only if storage is getting full"
      sql: |
        UPDATE audit_logs 
        SET archived = true
        WHERE log_level = 'INFO'
          AND created_at < NOW() - INTERVAL '90 days'
          AND archived IS NOT TRUE
      conditions:
        - query: "SELECT COUNT(*) FROM audit_logs WHERE log_level = 'INFO' AND created_at < NOW() - INTERVAL '90 days'"
          operator: ">"
          value: 10000  # Only if there are many old INFO logs
        - query: "SELECT COUNT(*) FROM audit_logs WHERE archived IS NOT TRUE"
          operator: ">"
          value: 1000000  # Only if total unarchived logs exceed 1M
      type: CLEANUP
      batchSize: 25000
      timeout: 2h

    - name: mark-purge-eligible
      description: "Mark very old logs for purging, only during maintenance windows"
      sql: |
        UPDATE audit_logs 
        SET purge_eligible = true
        WHERE created_at < NOW() - INTERVAL '2 years'
          AND log_level IN ('DEBUG', 'INFO')
          AND archived = true
          AND purge_eligible IS NOT TRUE
      conditions:
        - query: "SELECT EXTRACT(HOUR FROM NOW())"
          operator: ">="
          value: 2   # Only run between 2 AM
        - query: "SELECT EXTRACT(HOUR FROM NOW())"
          operator: "<="
          value: 4   # and 4 AM (maintenance window)
        - query: "SELECT COUNT(*) FROM audit_logs WHERE created_at < NOW() - INTERVAL '2 years' AND archived = true"
          operator: ">"
          value: 50000  # Only if there's significant old archived data
      dependsOn: ["archive-old-info-logs"]
      type: CLEANUP
      batchSize: 50000
      timeout: 4h

---
# Environment-specific conditional migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: feature-flag-migration
spec:
  database: config
  name: feature_flags
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: flag_name
          type: varchar(100)
        - name: environment
          type: varchar(20)
        - name: enabled
          type: boolean
        - name: rollout_percentage
          type: integer
        - name: auto_enabled
          type: boolean
        - name: stable
          type: boolean
  dataMigrations:
    - name: promote-stable-flags
      description: "Promote flags to stable only if they've been successful in staging"
      sql: |
        UPDATE feature_flags 
        SET stable = true,
            auto_enabled = true
        WHERE environment = 'production'
          AND enabled = true
          AND rollout_percentage = 100
          AND flag_name IN (
            SELECT flag_name FROM feature_flags 
            WHERE environment = 'staging' 
              AND enabled = true 
              AND rollout_percentage = 100
          )
          AND stable IS NOT TRUE
      conditions:
        - query: |
            SELECT COUNT(*) FROM feature_flags staging
            WHERE staging.environment = 'staging'
              AND staging.enabled = true
              AND staging.rollout_percentage = 100
              AND EXISTS (
                SELECT 1 FROM feature_flags prod
                WHERE prod.flag_name = staging.flag_name
                  AND prod.environment = 'production'
                  AND prod.enabled = true
              )
          operator: ">"
          value: 0  # Only run if there are staging flags ready for promotion
      type: TRANSFORM
      batchSize: 100

    - name: disable-failed-flags
      description: "Disable flags that have been problematic"
      sql: |
        UPDATE feature_flags 
        SET enabled = false,
            rollout_percentage = 0
        WHERE flag_name IN (
          SELECT flag_name FROM flag_incidents 
          WHERE severity = 'high' 
            AND created_at > NOW() - INTERVAL '24 hours'
        )
        AND enabled = true
      conditions:
        - query: "SELECT COUNT(*) FROM flag_incidents WHERE severity = 'high' AND created_at > NOW() - INTERVAL '24 hours'"
          operator: ">"
          value: 0  # Only run if there are recent high-severity incidents
      dependsOn: ["promote-stable-flags"]
      type: TRANSFORM
      batchSize: 50

---
# Load balancing conditional migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: server-load-balancing
spec:
  database: infrastructure
  name: server_assignments
  schema:
    mysql:
      columns:
        - name: id
          type: int
          constraints:
            primaryKey: true
        - name: user_id
          type: int
        - name: current_server
          type: varchar(50)
        - name: preferred_server
          type: varchar(50)
        - name: server_load
          type: int
        - name: needs_rebalancing
          type: boolean
  dataMigrations:
    - name: identify-rebalancing-needed
      description: "Identify servers needing load rebalancing"
      sql: |
        UPDATE server_assignments sa
        JOIN (
          SELECT 
            current_server,
            COUNT(*) as user_count,
            AVG(server_load) as avg_load
          FROM server_assignments 
          GROUP BY current_server
        ) server_stats ON sa.current_server = server_stats.current_server
        SET sa.needs_rebalancing = CASE
          WHEN server_stats.avg_load > 80 THEN true
          ELSE false
        END
        WHERE sa.needs_rebalancing IS NULL
      conditions:
        - query: "SELECT AVG(server_load) FROM server_assignments"
          operator: ">"
          value: 60  # Only rebalance if average load is high
        - query: "SELECT MAX(server_load) - MIN(server_load) FROM (SELECT AVG(server_load) as server_load FROM server_assignments GROUP BY current_server) as server_loads"
          operator: ">"
          value: 30  # Only if there's significant load imbalance
      type: TRANSFORM
      batchSize: 10000

# Usage Examples:
#
# 1. Plan with condition checking:
#    kubectl schemahero plan --spec-file conditional-migrations.yaml --dry-run --verbose
#
# 2. Apply during maintenance window:
#    kubectl schemahero apply --spec-file conditional-migrations.yaml --show-progress
#
# 3. Monitor conditional execution:
#    kubectl schemahero describe migration migration-name 