# Data quality conditional migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: data-quality-validation
spec:
  database: quality_db
  name: customer_data
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: email
          type: varchar(255)
        - name: phone
          type: varchar(20)
        - name: email_valid
          type: boolean
        - name: phone_valid
          type: boolean
        - name: data_quality_score
          type: decimal(5,2)
        - name: validated_at
          type: timestamp
  dataMigrations:
    - name: validate-email-addresses
      description: "Validate email addresses only if validation is needed"
      sql: |
        UPDATE customer_data 
        SET email_valid = CASE
          WHEN email ~ '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$' THEN true
          ELSE false
        END
        WHERE email_valid IS NULL
          AND email IS NOT NULL
      conditions:
        - query: "SELECT COUNT(*) FROM customer_data WHERE email IS NOT NULL AND email_valid IS NULL"
          operator: ">"
          value: 0
      type: TRANSFORM
      batchSize: 10000

    - name: validate-phone-numbers
      description: "Validate phone numbers only if there are unvalidated numbers"
      sql: |
        UPDATE customer_data 
        SET phone_valid = CASE
          WHEN phone ~ '^\+?[1-9]\d{1,14}$' THEN true
          ELSE false
        END
        WHERE phone_valid IS NULL
          AND phone IS NOT NULL
      conditions:
        - query: "SELECT COUNT(*) FROM customer_data WHERE phone IS NOT NULL AND phone_valid IS NULL"
          operator: ">"
          value: 0
      dependsOn: ["validate-email-addresses"]
      type: TRANSFORM
      batchSize: 8000

    - name: calculate-quality-score
      description: "Calculate data quality score only if validation is complete"
      sql: |
        UPDATE customer_data 
        SET data_quality_score = (
          CASE WHEN email_valid = true THEN 40 ELSE 0 END +
          CASE WHEN phone_valid = true THEN 30 ELSE 0 END +
          CASE WHEN email IS NOT NULL THEN 20 ELSE 0 END +
          CASE WHEN phone IS NOT NULL THEN 10 ELSE 0 END
        ),
        validated_at = NOW()
        WHERE data_quality_score IS NULL
      conditions:
        - query: "SELECT COUNT(*) FROM customer_data WHERE email_valid IS NOT NULL OR phone_valid IS NOT NULL"
          operator: ">"
          value: 100  # Only run if we have validation results
        - query: "SELECT COUNT(*) FROM customer_data WHERE data_quality_score IS NULL"
          operator: ">"
          value: 50   # Only run if there are records to process
      dependsOn: ["validate-email-addresses", "validate-phone-numbers"]
      type: TRANSFORM
      batchSize: 15000

