# Advanced Data Migration Patterns for SchemaHero
# This file demonstrates various data migration patterns and features

---
# Example 1: Template-based migration with parameters
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: products-normalization
  namespace: default
spec:
  database: ecommerce
  name: products
  schema:
    postgres:
      columns:
        - name: id
          type: serial
        - name: name
          type: varchar(255)
        - name: description
          type: text
        - name: price
          type: decimal(10,2)
        - name: normalized_name
          type: varchar(255)
        - name: search_vector
          type: tsvector
  
  dataMigrations:
    # Template-based migration for flexible column updates
    - name: "normalize-product-names"
      description: "Normalize product names for better search"
      type: TRANSFORM
      template:
        template: |
          UPDATE {{identifier .tableName}} 
          SET {{identifier .targetColumn}} = {{.normalizeFunc}}({{identifier .sourceColumn}})
          WHERE {{identifier .targetColumn}} IS NULL
            OR {{identifier .targetColumn}} != {{.normalizeFunc}}({{identifier .sourceColumn}})
        parameters:
          - name: tableName
            type: table
            default: "products"
          - name: sourceColumn
            type: column
            default: "name"
          - name: targetColumn
            type: column
            default: "normalized_name"
          - name: normalizeFunc
            type: string
            default: "LOWER"
      batchSize: 5000
      batchDelayMs: 100

---
# Example 2: Complex migration with dependencies and conditions
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: user-activity-archive
  namespace: default
spec:
  database: analytics
  name: user_activity
  schema:
    postgres:
      columns:
        - name: id
          type: serial
        - name: user_id
          type: integer
        - name: action
          type: varchar(100)
        - name: created_at
          type: timestamp
        - name: archived
          type: boolean
          default: "false"
  
  dataMigrations:
    # First, mark old records for archival
    - name: "mark-old-activities"
      description: "Mark activities older than 1 year for archival"
      type: TRANSFORM
      priority: 10
      sql: |
        UPDATE user_activity 
        SET archived = true 
        WHERE created_at < CURRENT_DATE - INTERVAL '1 year'
          AND archived = false
      conditions:
        - query: "SELECT COUNT(*) FROM user_activity WHERE created_at < CURRENT_DATE - INTERVAL '1 year' AND archived = false"
          operator: ">"
          value: 0
      batchSize: 10000
      timeout: "30m"
    
    # Then copy to archive table (depends on marking)
    - name: "copy-to-archive"
      description: "Copy archived activities to archive table"
      type: COPY
      priority: 5
      dependsOn: ["mark-old-activities"]
      sql: |
        INSERT INTO user_activity_archive (user_id, action, created_at, original_id)
        SELECT user_id, action, created_at, id 
        FROM user_activity 
        WHERE archived = true
          AND id NOT IN (SELECT original_id FROM user_activity_archive)
      conditions:
        - query: "SELECT 1 FROM information_schema.tables WHERE table_name = 'user_activity_archive'"
          operator: "EXISTS"
      batchSize: 5000
      batchDelayMs: 500
      timeout: "45m"
    
    # Finally, clean up archived records (depends on copying)
    - name: "cleanup-archived"
      description: "Remove successfully archived activities"
      type: CLEANUP
      priority: 1
      dependsOn: ["copy-to-archive"]
      sql: |
        DELETE FROM user_activity 
        WHERE archived = true 
          AND id IN (SELECT original_id FROM user_activity_archive)
      reversible: true
      reverseSQL: |
        INSERT INTO user_activity (id, user_id, action, created_at, archived)
        SELECT original_id, user_id, action, created_at, true
        FROM user_activity_archive
        WHERE original_id NOT IN (SELECT id FROM user_activity)
      batchSize: 2000
      batchDelayMs: 1000
      timeout: "60m"

---
# Example 3: Conditional migration based on environment
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: feature-flags-migration
  namespace: default
spec:
  database: config
  name: feature_flags
  schema:
    postgres:
      columns:
        - name: id
          type: serial
        - name: name
          type: varchar(100)
        - name: enabled
          type: boolean
        - name: environment
          type: varchar(50)
        - name: percentage
          type: integer
  
  dataMigrations:
    # Enable feature gradually based on environment
    - name: "gradual-feature-rollout"
      description: "Gradually enable new feature based on percentage"
      type: TRANSFORM
      template:
        template: |
          UPDATE feature_flags 
          SET enabled = true,
              percentage = {{.percentage}}
          WHERE name = {{quote .featureName}}
            AND environment = {{quote .environment}}
            AND (percentage < {{.percentage}} OR percentage IS NULL)
        parameters:
          - name: featureName
            type: string
            required: true
            description: "Name of the feature to roll out"
          - name: environment
            type: enum
            required: true
            description: "Target environment (dev, staging, prod)"
          - name: percentage
            type: integer
            default: "10"
            description: "Percentage of users to enable"
      conditions:
        - query: "SELECT COUNT(*) FROM feature_flags WHERE name = 'new-checkout-flow'"
          operator: ">"
          value: 0
      tags: ["feature-rollout", "gradual"]

