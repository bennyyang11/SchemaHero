apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: financial-data-validation
  annotations:
    description: "Validate and correct financial data only when discrepancies exist"
spec:
  database: financial
  name: transactions
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: account_id
          type: integer
        - name: amount
          type: decimal(15,2)
        - name: tax_amount
          type: decimal(15,2)
        - name: total_amount
          type: decimal(15,2)
        - name: calculated_total
          type: decimal(15,2)
        - name: discrepancy_found
          type: boolean
        - name: corrected_at
          type: timestamp
  dataMigrations:
    - name: calculate-expected-totals
      description: "Calculate expected totals to identify discrepancies"
      sql: |
        UPDATE transactions 
        SET calculated_total = amount + COALESCE(tax_amount, 0)
        WHERE calculated_total IS NULL
      type: TRANSFORM
      batchSize: 50000

    - name: identify-discrepancies
      description: "Mark transactions with discrepancies only if discrepancies exist"
      sql: |
        UPDATE transactions 
        SET discrepancy_found = true
        WHERE ABS(total_amount - calculated_total) > 0.01
          AND discrepancy_found IS NOT TRUE
      conditions:
        - query: "SELECT COUNT(*) FROM transactions WHERE ABS(total_amount - calculated_total) > 0.01"
          operator: ">"
          value: 0  # Only run if discrepancies are found
        - query: "SELECT COUNT(*) FROM transactions WHERE calculated_total IS NOT NULL"
          operator: ">"
          value: 1000  # Only run if we have enough calculated data
      dependsOn: ["calculate-expected-totals"]
      type: TRANSFORM
      batchSize: 25000

    - name: correct-discrepancies
      description: "Correct discrepancies only if correction is safe"
      sql: |
        UPDATE transactions 
        SET total_amount = calculated_total,
            corrected_at = NOW()
        WHERE discrepancy_found = true
          AND ABS(total_amount - calculated_total) <= 100.00  -- Only small discrepancies
          AND corrected_at IS NULL
      conditions:
        - query: "SELECT COUNT(*) FROM transactions WHERE discrepancy_found = true"
          operator: ">"
          value: 0
        - query: "SELECT COUNT(*) FROM transactions WHERE discrepancy_found = true AND ABS(total_amount - calculated_total) > 100.00"
          operator: "="
          value: 0  # Don't run if there are large discrepancies (needs manual review)
      dependsOn: ["identify-discrepancies"]
      type: TRANSFORM
      batchSize: 5000
      reversible: true
      reverseSQL: |
        UPDATE transactions 
        SET total_amount = amount + COALESCE(tax_amount, 0),
            corrected_at = NULL
        WHERE corrected_at > NOW() - INTERVAL '1 hour'

