# Cassandra Example with CQL
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: cassandra-user-sessions
spec:
  database: sessionstore
  name: user_sessions
  schema:
    cassandra:
      columns:
        - name: user_id
          type: uuid
        - name: session_id
          type: uuid
        - name: status
          type: text
        - name: created_at
          type: timestamp
      primaryKey:
        - user_id
        - session_id
  dataMigrations:
    - name: set-session-status
      description: "Set default status for sessions (Cassandra CQL)"
      sql: "UPDATE user_sessions SET status = 'active' WHERE user_id = ? AND session_id = ?"
      type: BACKFILL
      # Note: Cassandra requires parameterized queries with primary key 