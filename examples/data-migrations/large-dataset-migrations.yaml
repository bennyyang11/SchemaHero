# Partitioned table migration strategy
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: time-partitioned-events
spec:
  database: events_db
  name: user_events
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: user_id
          type: integer
        - name: event_type
          type: varchar(50)
        - name: event_data
          type: jsonb
        - name: created_at
          type: timestamp
        - name: processed
          type: boolean
        - name: enriched_data
          type: jsonb
      indexes:
        - name: idx_events_user_created
          columns: ["user_id", "created_at"]
        - name: idx_events_type_created
          columns: ["event_type", "created_at"]
  dataMigrations:
    - name: enrich-current-month
      description: "Enrich current month events (highest priority)"
      sql: |
        UPDATE user_events 
        SET enriched_data = jsonb_build_object(
          'user_id', user_id,
          'event_type', event_type,
          'month', EXTRACT(MONTH FROM created_at),
          'year', EXTRACT(YEAR FROM created_at),
          'day_of_week', EXTRACT(DOW FROM created_at),
          'processed_at', NOW()
        ),
        processed = true
        WHERE created_at >= DATE_TRUNC('month', NOW())
          AND processed IS NOT TRUE
      type: TRANSFORM
      batchSize: 75000        # Large batches for recent data
      batchDelayMs: 500       # Fast processing for current data
      timeout: 4h
      priority: 10

    - name: enrich-last-3-months
      description: "Enrich last 3 months events (medium priority)"
      sql: |
        UPDATE user_events 
        SET enriched_data = jsonb_build_object(
          'user_id', user_id,
          'event_type', event_type,
          'month', EXTRACT(MONTH FROM created_at),
          'year', EXTRACT(YEAR FROM created_at),
          'day_of_week', EXTRACT(DOW FROM created_at),
          'processed_at', NOW()
        ),
        processed = true
        WHERE created_at >= NOW() - INTERVAL '3 months'
          AND created_at < DATE_TRUNC('month', NOW())
          AND processed IS NOT TRUE
      dependsOn: ["enrich-current-month"]
      type: TRANSFORM
      batchSize: 50000
      batchDelayMs: 2000      # Slower processing for historical data
      timeout: 12h
      priority: 5

    - name: archive-old-events
      description: "Mark old events for archival (lowest priority)"
      sql: |
        UPDATE user_events 
        SET enriched_data = jsonb_build_object(
          'archived', true,
          'archive_reason', 'age_based',
          'archived_at', NOW()
        ),
        processed = true
        WHERE created_at < NOW() - INTERVAL '1 year'
          AND processed IS NOT TRUE
      dependsOn: ["enrich-last-3-months"]
      type: CLEANUP
      batchSize: 200000       # Very large batches for archival
      batchDelayMs: 5000      # Slowest processing for old data
      timeout: 48h            # Allow up to 48 hours
      priority: 1

