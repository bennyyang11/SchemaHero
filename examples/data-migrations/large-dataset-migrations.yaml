# Memory-efficient JSON processing
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: large-json-migration
spec:
  database: content_db
  name: user_content
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: user_id
          type: integer
        - name: raw_content
          type: jsonb
        - name: processed_content
          type: jsonb
        - name: content_type
          type: varchar(50)
        - name: word_count
          type: integer
        - name: created_at
          type: timestamp
  dataMigrations:
    - name: process-json-content-small-batches
      description: "Process large JSON content in small memory-efficient batches"
      sql: |
        UPDATE user_content 
        SET processed_content = jsonb_build_object(
          'title', raw_content->>'title',
          'summary', LEFT(raw_content->>'content', 500),
          'metadata', raw_content->'metadata',
          'processed_at', extract(epoch from NOW())
        ),
        content_type = COALESCE(raw_content->>'type', 'unknown'),
        word_count = array_length(
          string_to_array(raw_content->>'content', ' '), 
          1
        )
        WHERE processed_content IS NULL
          AND raw_content IS NOT NULL
          AND jsonb_typeof(raw_content) = 'object'
      type: TRANSFORM
      batchSize: 2000         # Small batches for JSON processing
      batchDelayMs: 3000      # Long delay for memory management
      timeout: 48h            # Very long timeout for complex processing
      priority: 3

# Performance monitoring recommendations:
#
# 1. Monitor database CPU and memory usage during migration
# 2. Watch for connection pool exhaustion
# 3. Check for lock contention on target tables
# 4. Monitor application performance if database is in use
# 5. Consider read replicas for reporting during migration
# 6. Plan for VACUUM/ANALYZE after large UPDATEs (PostgreSQL)
# 7. Monitor replication lag if using database replication 