# Calculated Field Migrations Examples
#
# This file demonstrates how to use data migrations for calculating and populating
# fields based on existing data, functions, and cross-table relationships.

---
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: users-calculated-fields
  annotations:
    description: "Add calculated fields based on existing user data"
spec:
  database: myapp
  name: users
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: first_name
          type: varchar(100)
        - name: last_name
          type: varchar(100)
        - name: email
          type: varchar(255)
        - name: full_name
          type: varchar(255)
        - name: normalized_email
          type: varchar(255)
        - name: email_domain
          type: varchar(255)
        - name: created_at
          type: timestamp
        - name: account_age_days
          type: integer
  dataMigrations:
    - name: calculate-full-name
      description: "Calculate full name from first and last name"
      sql: |
        UPDATE users 
        SET full_name = TRIM(CONCAT(first_name, ' ', last_name))
        WHERE full_name IS NULL 
          AND (first_name IS NOT NULL OR last_name IS NOT NULL)
      type: TRANSFORM
      batchSize: 10000

    - name: normalize-email
      description: "Calculate normalized email address"
      sql: |
        UPDATE users 
        SET normalized_email = LOWER(TRIM(email))
        WHERE normalized_email IS NULL 
          AND email IS NOT NULL
      dependsOn: ["calculate-full-name"]
      type: TRANSFORM
      batchSize: 15000

    - name: extract-email-domain
      description: "Extract domain from email address"
      sql: |
        UPDATE users 
        SET email_domain = SUBSTRING(normalized_email FROM '@(.*)$')
        WHERE email_domain IS NULL 
          AND normalized_email IS NOT NULL
      dependsOn: ["normalize-email"]
      type: TRANSFORM
      batchSize: 15000

    - name: calculate-account-age
      description: "Calculate account age in days"
      sql: |
        UPDATE users 
        SET account_age_days = EXTRACT(DAY FROM NOW() - created_at)
        WHERE account_age_days IS NULL 
          AND created_at IS NOT NULL
      dependsOn: ["extract-email-domain"]
      type: TRANSFORM
      batchSize: 20000

---
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: orders-calculated-totals
  annotations:
    description: "Calculate order totals and statistics"
spec:
  database: ecommerce
  name: orders
  schema:
    mysql:
      columns:
        - name: id
          type: int
          constraints:
            primaryKey: true
        - name: customer_id
          type: int
        - name: subtotal
          type: decimal(12,2)
        - name: tax_rate
          type: decimal(5,4)
        - name: tax_amount
          type: decimal(12,2)
        - name: shipping_cost
          type: decimal(10,2)
        - name: total_amount
          type: decimal(12,2)
        - name: discount_percentage
          type: decimal(5,2)
        - name: final_amount
          type: decimal(12,2)
  dataMigrations:
    - name: calculate-tax-amount
      description: "Calculate tax amount from subtotal and rate"
      sql: |
        UPDATE orders 
        SET tax_amount = ROUND(subtotal * tax_rate, 2)
        WHERE tax_amount IS NULL 
          AND subtotal IS NOT NULL 
          AND tax_rate IS NOT NULL
      type: TRANSFORM
      batchSize: 8000

    - name: calculate-total-amount
      description: "Calculate total before discounts"
      sql: |
        UPDATE orders 
        SET total_amount = subtotal + COALESCE(tax_amount, 0) + COALESCE(shipping_cost, 0)
        WHERE total_amount IS NULL 
          AND subtotal IS NOT NULL
      dependsOn: ["calculate-tax-amount"]
      type: TRANSFORM
      batchSize: 8000

    - name: calculate-final-amount
      description: "Calculate final amount after discounts"
      sql: |
        UPDATE orders 
        SET final_amount = total_amount * (1 - COALESCE(discount_percentage, 0) / 100)
        WHERE final_amount IS NULL 
          AND total_amount IS NOT NULL
      dependsOn: ["calculate-total-amount"]
      type: TRANSFORM
      batchSize: 8000

