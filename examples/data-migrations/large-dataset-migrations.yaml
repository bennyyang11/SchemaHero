# Multi-table large dataset migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: denormalized-reporting-data
spec:
  database: reporting
  name: user_order_summary
  schema:
    mysql:
      columns:
        - name: user_id
          type: int
          constraints:
            primaryKey: true
        - name: total_orders
          type: int
        - name: total_spent
          type: decimal(15,2)
        - name: avg_order_value
          type: decimal(10,2)
        - name: first_order_date
          type: timestamp
        - name: last_order_date
          type: timestamp
        - name: customer_lifetime_days
          type: int
  dataMigrations:
    - name: calculate-order-summary
      description: "Calculate order summary from 100M+ order records"
      sql: |
        INSERT INTO user_order_summary (
          user_id, total_orders, total_spent, avg_order_value,
          first_order_date, last_order_date, customer_lifetime_days
        )
        SELECT 
          o.user_id,
          COUNT(*) as total_orders,
          SUM(o.total_amount) as total_spent,
          AVG(o.total_amount) as avg_order_value,
          MIN(o.created_at) as first_order_date,
          MAX(o.created_at) as last_order_date,
          DATEDIFF(MAX(o.created_at), MIN(o.created_at)) as customer_lifetime_days
        FROM orders o
        WHERE o.status = 'completed'
          AND o.user_id NOT IN (SELECT user_id FROM user_order_summary)
        GROUP BY o.user_id
        HAVING COUNT(*) > 0
      type: COPY
      batchSize: 10000        # Process 10K users at a time
      batchDelayMs: 5000      # 5 second delay to reduce database load
      timeout: 24h            # Allow up to 24 hours for completion
      priority: 1

