apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: analytics-calculated-metrics
  annotations:
    description: "Calculate analytics metrics from raw event data"
spec:
  database: analytics
  name: user_metrics
  schema:
    postgres:
      columns:
        - name: user_id
          type: integer
          constraints:
            primaryKey: true
        - name: total_sessions
          type: integer
        - name: total_pageviews
          type: integer
        - name: avg_session_duration
          type: decimal(10,2)
        - name: last_activity_at
          type: timestamp
        - name: engagement_score
          type: decimal(5,2)
        - name: calculated_at
          type: timestamp
  dataMigrations:
    - name: calculate-session-metrics
      description: "Calculate session count and average duration"
      sql: |
        UPDATE user_metrics 
        SET total_sessions = session_data.session_count,
            avg_session_duration = session_data.avg_duration,
            last_activity_at = session_data.last_activity
        FROM (
          SELECT 
            user_id,
            COUNT(*) as session_count,
            AVG(EXTRACT(EPOCH FROM duration)) as avg_duration,
            MAX(ended_at) as last_activity
          FROM user_sessions 
          WHERE ended_at IS NOT NULL
          GROUP BY user_id
        ) session_data
        WHERE user_metrics.user_id = session_data.user_id
          AND user_metrics.total_sessions IS NULL
      type: TRANSFORM
      batchSize: 5000
      timeout: 45m

    - name: calculate-pageview-metrics
      description: "Calculate total pageviews from events"
      sql: |
        UPDATE user_metrics 
        SET total_pageviews = pageview_data.pageview_count
        FROM (
          SELECT 
            user_id,
            COUNT(*) as pageview_count
          FROM page_events 
          WHERE event_type = 'pageview'
          GROUP BY user_id
        ) pageview_data
        WHERE user_metrics.user_id = pageview_data.user_id
          AND user_metrics.total_pageviews IS NULL
      dependsOn: ["calculate-session-metrics"]
      type: TRANSFORM
      batchSize: 5000

    - name: calculate-engagement-score
      description: "Calculate engagement score from multiple metrics"
      sql: |
        UPDATE user_metrics 
        SET engagement_score = LEAST(100, 
          (COALESCE(total_sessions, 0) * 0.3) +
          (COALESCE(total_pageviews, 0) * 0.1) +
          (CASE 
            WHEN avg_session_duration > 300 THEN 30
            WHEN avg_session_duration > 120 THEN 15
            ELSE 5
          END)
        ),
        calculated_at = NOW()
        WHERE engagement_score IS NULL
          AND (total_sessions IS NOT NULL OR total_pageviews IS NOT NULL)
      dependsOn: ["calculate-session-metrics", "calculate-pageview-metrics"]
      type: TRANSFORM
      batchSize: 10000

