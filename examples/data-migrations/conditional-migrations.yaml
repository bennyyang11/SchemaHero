# Seasonal data migration
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: seasonal-pricing-update
spec:
  database: ecommerce
  name: products
  schema:
    mysql:
      columns:
        - name: id
          type: int
          constraints:
            primaryKey: true
        - name: name
          type: varchar(255)
        - name: category
          type: varchar(100)
        - name: base_price
          type: decimal(10,2)
        - name: seasonal_price
          type: decimal(10,2)
        - name: seasonal_discount
          type: decimal(5,2)
        - name: season_updated_at
          type: timestamp
  dataMigrations:
    - name: apply-winter-pricing
      description: "Apply winter seasonal pricing only during winter months"
      sql: |
        UPDATE products 
        SET seasonal_price = CASE
          WHEN category = 'outerwear' THEN base_price * 1.20
          WHEN category = 'electronics' THEN base_price * 0.90
          ELSE base_price
        END,
        seasonal_discount = CASE
          WHEN category = 'outerwear' THEN 0
          WHEN category = 'electronics' THEN 10.00
          ELSE 5.00
        END,
        season_updated_at = NOW()
        WHERE seasonal_price IS NULL
      conditions:
        - query: "SELECT MONTH(NOW())"
          operator: ">="
          value: 11  # November or later
        - query: "SELECT MONTH(NOW())"
          operator: "<="
          value: 2   # February or earlier
        - query: "SELECT COUNT(*) FROM products WHERE seasonal_price IS NULL"
          operator: ">"
          value: 100  # Only if enough products need updating
      type: TRANSFORM
      batchSize: 5000

