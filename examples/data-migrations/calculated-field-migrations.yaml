# Time-based calculations
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: subscription-calculated-dates
spec:
  database: billing
  name: subscriptions
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: user_id
          type: integer
        - name: plan_type
          type: varchar(50)
        - name: started_at
          type: timestamp
        - name: billing_cycle
          type: varchar(20)
        - name: next_billing_date
          type: timestamp
        - name: expires_at
          type: timestamp
        - name: days_remaining
          type: integer
  dataMigrations:
    - name: calculate-next-billing
      description: "Calculate next billing date based on cycle"
      sql: |
        UPDATE subscriptions 
        SET next_billing_date = CASE billing_cycle
          WHEN 'monthly' THEN started_at + INTERVAL '1 month'
          WHEN 'quarterly' THEN started_at + INTERVAL '3 months' 
          WHEN 'yearly' THEN started_at + INTERVAL '1 year'
          ELSE started_at + INTERVAL '1 month'
        END
        WHERE next_billing_date IS NULL 
          AND started_at IS NOT NULL
      type: TRANSFORM
      batchSize: 5000

    - name: calculate-expiration
      description: "Calculate subscription expiration dates"
      sql: |
        UPDATE subscriptions 
        SET expires_at = CASE plan_type
          WHEN 'trial' THEN started_at + INTERVAL '14 days'
          WHEN 'basic' THEN started_at + INTERVAL '1 year'
          WHEN 'premium' THEN started_at + INTERVAL '1 year'
          ELSE started_at + INTERVAL '30 days'
        END
        WHERE expires_at IS NULL 
          AND started_at IS NOT NULL
      dependsOn: ["calculate-next-billing"]
      type: TRANSFORM
      batchSize: 5000

    - name: calculate-days-remaining
      description: "Calculate days remaining until expiration"
      sql: |
        UPDATE subscriptions 
        SET days_remaining = GREATEST(0, 
          EXTRACT(DAY FROM expires_at - NOW())
        )
        WHERE days_remaining IS NULL 
          AND expires_at IS NOT NULL
      dependsOn: ["calculate-expiration"]
      type: TRANSFORM
      batchSize: 10000

