# Complex calculations with JSON data (PostgreSQL)
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: user-profile-calculations
spec:
  database: social
  name: user_profiles
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: user_id
          type: integer
        - name: raw_preferences
          type: jsonb
        - name: calculated_score
          type: decimal(8,2)
        - name: preference_summary
          type: text
        - name: activity_level
          type: varchar(20)
  dataMigrations:
    - name: calculate-preference-score
      description: "Calculate user preference score from JSON data"
      sql: |
        UPDATE user_profiles 
        SET calculated_score = (
          COALESCE((raw_preferences->>'engagement_weight')::decimal, 1.0) * 10 +
          COALESCE((raw_preferences->>'activity_weight')::decimal, 1.0) * 5 +
          COALESCE(jsonb_array_length(raw_preferences->'interests'), 0) * 2
        )
        WHERE calculated_score IS NULL 
          AND raw_preferences IS NOT NULL
      type: TRANSFORM
      batchSize: 3000

    - name: generate-preference-summary
      description: "Generate human-readable preference summary"
      sql: |
        UPDATE user_profiles 
        SET preference_summary = CONCAT(
          'Score: ', ROUND(calculated_score, 1), 
          ', Interests: ', COALESCE(jsonb_array_length(raw_preferences->'interests'), 0),
          ', Type: ', COALESCE(raw_preferences->>'user_type', 'standard')
        )
        WHERE preference_summary IS NULL 
          AND calculated_score IS NOT NULL
      dependsOn: ["calculate-preference-score"]
      type: TRANSFORM
      batchSize: 5000

    - name: determine-activity-level
      description: "Determine activity level from calculated metrics"
      sql: |
        UPDATE user_profiles 
        SET activity_level = CASE
          WHEN calculated_score > 50 THEN 'high'
          WHEN calculated_score > 20 THEN 'medium'
          WHEN calculated_score > 5 THEN 'low'
          ELSE 'inactive'
        END
        WHERE activity_level IS NULL 
          AND calculated_score IS NOT NULL
      dependsOn: ["generate-preference-summary"]
      type: TRANSFORM
      batchSize: 8000 