# Memory-optimized migration for very large tables
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: log-data-optimization
  annotations:
    description: "Optimize 100M+ log records with memory-efficient processing"
spec:
  database: logs_db
  name: application_logs
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: message
          type: text
        - name: log_level
          type: varchar(10)
        - name: structured_data
          type: jsonb
        - name: message_hash
          type: varchar(64)
        - name: category
          type: varchar(50)
        - name: processed
          type: boolean
        - name: created_at
          type: timestamp
      indexes:
        - name: idx_logs_created_level
          columns: ["created_at", "log_level"]
        - name: idx_logs_hash
          columns: ["message_hash"]
  dataMigrations:
    - name: process-error-logs
      description: "Process ERROR level logs first (highest priority)"
      sql: |
        UPDATE application_logs 
        SET message_hash = MD5(message),
            category = 'error',
            processed = true
        WHERE log_level = 'ERROR'
          AND processed IS NULL
          AND created_at > NOW() - INTERVAL '30 days'
      type: TRANSFORM
      batchSize: 10000        # Smaller batches for error logs
      batchDelayMs: 100       # Fast processing for errors
      timeout: 2h
      priority: 10

    - name: process-warn-logs
      description: "Process WARN level logs (medium priority)"
      sql: |
        UPDATE application_logs 
        SET message_hash = MD5(message),
            category = 'warning', 
            processed = true
        WHERE log_level = 'WARN'
          AND processed IS NULL
          AND created_at > NOW() - INTERVAL '30 days'
      dependsOn: ["process-error-logs"]
      type: TRANSFORM
      batchSize: 25000
      batchDelayMs: 500
      timeout: 4h
      priority: 5

    - name: process-info-logs
      description: "Process INFO level logs (lower priority, larger batches)"
      sql: |
        UPDATE application_logs 
        SET message_hash = MD5(message),
            category = 'information',
            processed = true
        WHERE log_level = 'INFO'
          AND processed IS NULL
          AND created_at > NOW() - INTERVAL '7 days'  # Only recent INFO logs
      dependsOn: ["process-warn-logs"]
      type: TRANSFORM
      batchSize: 100000       # Very large batches for bulk processing
      batchDelayMs: 2000      # Longer delay to manage load
      timeout: 8h
      priority: 2

    - name: archive-old-logs
      description: "Mark very old logs for archival"
      sql: |
        UPDATE application_logs 
        SET category = 'archived',
            processed = true
        WHERE created_at < NOW() - INTERVAL '90 days'
          AND processed IS NULL
      dependsOn: ["process-info-logs"]
      type: CLEANUP
      batchSize: 50000
      batchDelayMs: 3000      # Very slow processing for archival
      timeout: 24h            # Allow up to 24 hours
      priority: 1

---
# Template-based large dataset processing
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: templated-large-migration
spec:
  database: warehouse
  name: sales_data
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: sale_date
          type: date
        - name: amount
          type: decimal(12,2)
        - name: region
          type: varchar(50)
        - name: quarter
          type: varchar(7)
        - name: year
          type: integer
        - name: amount_category
          type: varchar(20)
  dataMigrations:
    - name: calculate-time-dimensions
      description: "Calculate quarter and year from sale_date for 50M+ records"
      template:
        template: |
          UPDATE {{.table_name}}
          SET quarter = CONCAT(
            EXTRACT(YEAR FROM sale_date), 
            '-Q', 
            EXTRACT(QUARTER FROM sale_date)
          ),
          year = EXTRACT(YEAR FROM sale_date)
          WHERE {{.date_column}} BETWEEN {{.start_date | quote}} AND {{.end_date | quote}}
            AND quarter IS NULL
        parameters:
          - name: date_column
            type: column
            default: "sale_date"
          - name: start_date
            type: date
            required: true
          - name: end_date
            type: date
            required: true
      type: TRANSFORM
      batchSize: 100000       # Very large batches for simple calculations
      batchDelayMs: 1000
      timeout: 8h

    - name: categorize-amounts
      description: "Categorize sales amounts for analysis"
      sql: |
        UPDATE sales_data 
        SET amount_category = CASE
          WHEN amount > 10000 THEN 'enterprise'
          WHEN amount > 1000 THEN 'business'
          WHEN amount > 100 THEN 'professional'
          ELSE 'personal'
        END
        WHERE amount_category IS NULL
          AND amount IS NOT NULL
      dependsOn: ["calculate-time-dimensions"]
      type: TRANSFORM
      batchSize: 150000       # Largest batches for simple CASE statements
      batchDelayMs: 800
      timeout: 6h

