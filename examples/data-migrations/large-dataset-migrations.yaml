# Large Dataset Migrations Examples
#
# This file demonstrates how to handle enterprise-scale data migrations
# with performance optimization, batching, and monitoring.

---
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: enterprise-user-migration
  annotations:
    description: "Migrate 10M+ user records with performance optimization"
spec:
  database: enterprise_db
  name: users
  schema:
    postgres:
      columns:
        - name: id
          type: bigserial
        - name: email
          type: varchar(255)
        - name: normalized_email
          type: varchar(255)
        - name: email_hash
          type: varchar(64)
        - name: status
          type: varchar(20)
        - name: tier
          type: varchar(20)
        - name: migrated_at
          type: timestamp
        - name: migration_batch
          type: integer
      indexes:
        - name: idx_users_email
          columns: ["email"]
        - name: idx_users_status
          columns: ["status"]
        - name: idx_users_migrated_at
          columns: ["migrated_at"]
  dataMigrations:
    - name: normalize-emails-batch-1
      description: "Normalize email addresses for first 5M users"
      sql: |
        UPDATE users 
        SET normalized_email = LOWER(TRIM(email)),
            email_hash = MD5(LOWER(TRIM(email))),
            migration_batch = 1,
            migrated_at = NOW()
        WHERE id BETWEEN 1 AND 5000000
          AND normalized_email IS NULL
          AND email IS NOT NULL
      type: TRANSFORM
      batchSize: 50000        # Large batches for efficiency
      batchDelayMs: 1000      # 1 second delay between batches
      timeout: 6h             # Allow plenty of time
      priority: 5

    - name: normalize-emails-batch-2
      description: "Normalize email addresses for second 5M users"
      sql: |
        UPDATE users 
        SET normalized_email = LOWER(TRIM(email)),
            email_hash = MD5(LOWER(TRIM(email))),
            migration_batch = 2,
            migrated_at = NOW()
        WHERE id BETWEEN 5000001 AND 10000000
          AND normalized_email IS NULL
          AND email IS NOT NULL
      dependsOn: ["normalize-emails-batch-1"]
      type: TRANSFORM
      batchSize: 50000
      batchDelayMs: 1000
      timeout: 6h
      priority: 4

    - name: set-user-tiers
      description: "Calculate user tiers based on activity"
      sql: |
        UPDATE users 
        SET tier = CASE
          WHEN id IN (
            SELECT user_id FROM user_activity 
            WHERE last_login > NOW() - INTERVAL '30 days'
            GROUP BY user_id 
            HAVING COUNT(*) > 50
          ) THEN 'premium'
          WHEN id IN (
            SELECT user_id FROM user_activity 
            WHERE last_login > NOW() - INTERVAL '90 days'
            GROUP BY user_id 
            HAVING COUNT(*) > 10
          ) THEN 'active'
          ELSE 'standard'
        END,
        migrated_at = NOW()
        WHERE tier IS NULL
          AND migration_batch IS NOT NULL
      dependsOn: ["normalize-emails-batch-1", "normalize-emails-batch-2"]
      type: TRANSFORM
      batchSize: 25000
      timeout: 4h

---
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: transaction-history-migration
  annotations:
    description: "Migrate 50M+ transaction records with optimized batching"
spec:
  database: financial_db
  name: transactions
  schema:
    mysql:
      columns:
        - name: id
          type: bigint
          constraints:
            primaryKey: true
        - name: user_id
          type: int
        - name: amount
          type: decimal(15,2)
        - name: currency
          type: varchar(3)
        - name: amount_usd
          type: decimal(15,2)
        - name: created_at
          type: timestamp
        - name: processed_at
          type: timestamp
        - name: processing_time_seconds
          type: int
      indexes:
        - name: idx_transactions_user_created
          columns: ["user_id", "created_at"]
        - name: idx_transactions_amount
          columns: ["amount_usd"]
  dataMigrations:
    - name: convert-to-usd-recent
      description: "Convert recent transactions to USD (last 90 days)"
      sql: |
        UPDATE transactions t
        JOIN exchange_rates er ON t.currency = er.currency 
        SET t.amount_usd = t.amount * er.rate_to_usd
        WHERE t.amount_usd IS NULL
          AND t.created_at > NOW() - INTERVAL 90 DAY
          AND er.date = DATE(t.created_at)
      type: TRANSFORM
      batchSize: 100000       # Very large batches for bulk operations
      batchDelayMs: 500       # Short delay for recent data
      timeout: 4h
      priority: 10

    - name: convert-to-usd-historical
      description: "Convert historical transactions to USD (slower processing)"
      sql: |
        UPDATE transactions t
        JOIN exchange_rates er ON t.currency = er.currency
        SET t.amount_usd = t.amount * er.rate_to_usd
        WHERE t.amount_usd IS NULL
          AND t.created_at <= NOW() - INTERVAL 90 DAY
          AND ABS(DATEDIFF(er.date, DATE(t.created_at))) <= 1
      dependsOn: ["convert-to-usd-recent"]
      type: TRANSFORM
      batchSize: 25000        # Smaller batches for historical data
      batchDelayMs: 2000      # Longer delay to reduce load
      timeout: 12h            # Much longer timeout
      priority: 3

    - name: calculate-processing-times
      description: "Calculate processing times for completed transactions"
      sql: |
        UPDATE transactions 
        SET processing_time_seconds = TIMESTAMPDIFF(SECOND, created_at, processed_at)
        WHERE processing_time_seconds IS NULL
          AND processed_at IS NOT NULL
          AND created_at IS NOT NULL
      dependsOn: ["convert-to-usd-historical"]
      type: TRANSFORM
      batchSize: 75000
      timeout: 3h

