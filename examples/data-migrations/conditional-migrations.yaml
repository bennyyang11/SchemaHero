# Conditional Migrations Examples
#
# This file demonstrates how to use conditional data migrations that execute
# only when specific conditions are met in your database.

---
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: user-cleanup-conditional
  annotations:
    description: "Clean up user data only when certain conditions are met"
spec:
  database: myapp
  name: users
  schema:
    postgres:
      columns:
        - name: id
          type: integer
          constraints:
            primaryKey: true
        - name: email
          type: varchar(255)
        - name: status
          type: varchar(20)
        - name: last_login_at
          type: timestamp
        - name: inactive_notified
          type: boolean
        - name: cleanup_eligible
          type: boolean
  dataMigrations:
    - name: mark-inactive-users
      description: "Mark users as inactive only if they haven't logged in for 6 months"
      sql: |
        UPDATE users 
        SET status = 'inactive',
            inactive_notified = false
        WHERE last_login_at < NOW() - INTERVAL '6 months'
          AND status = 'active'
      conditions:
        - query: "SELECT COUNT(*) FROM users WHERE last_login_at < NOW() - INTERVAL '6 months' AND status = 'active'"
          operator: ">"
          value: 0
      type: CLEANUP
      batchSize: 5000

    - name: notify-inactive-users
      description: "Mark inactive users as notified only if there are inactive users to notify"
      sql: |
        UPDATE users 
        SET inactive_notified = true
        WHERE status = 'inactive' 
          AND inactive_notified = false
      conditions:
        - query: "SELECT COUNT(*) FROM users WHERE status = 'inactive' AND inactive_notified = false"
          operator: ">"
          value: 10  # Only run if there are more than 10 users to notify
      dependsOn: ["mark-inactive-users"]
      type: TRANSFORM
      batchSize: 2000

    - name: mark-cleanup-eligible
      description: "Mark users eligible for cleanup only if inactive for 1 year"
      sql: |
        UPDATE users 
        SET cleanup_eligible = true
        WHERE status = 'inactive'
          AND last_login_at < NOW() - INTERVAL '1 year'
          AND cleanup_eligible IS NOT TRUE
      conditions:
        - query: "SELECT COUNT(*) FROM users WHERE status = 'inactive' AND last_login_at < NOW() - INTERVAL '1 year'"
          operator: ">"
          value: 100  # Only run if there are significant cleanup candidates
        - query: "SELECT COUNT(*) FROM users WHERE cleanup_eligible = true"
          operator: "<"
          value: 10000  # Don't run if already too many marked for cleanup
      dependsOn: ["notify-inactive-users"]
      type: CLEANUP
      batchSize: 1000

---
apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: inventory-rebalancing
  annotations:
    description: "Rebalance inventory only when stock levels require it"
spec:
  database: warehouse
  name: inventory
  schema:
    mysql:
      columns:
        - name: id
          type: int
          constraints:
            primaryKey: true
        - name: product_id
          type: int
        - name: warehouse_id
          type: int
        - name: current_stock
          type: int
        - name: reserved_stock
          type: int
        - name: available_stock
          type: int
        - name: reorder_point
          type: int
        - name: needs_reorder
          type: boolean
  dataMigrations:
    - name: calculate-available-stock
      description: "Calculate available stock only when reservations have changed"
      sql: |
        UPDATE inventory 
        SET available_stock = current_stock - COALESCE(reserved_stock, 0)
        WHERE available_stock IS NULL 
          OR available_stock != (current_stock - COALESCE(reserved_stock, 0))
      conditions:
        - query: |
            SELECT COUNT(*) FROM inventory 
            WHERE available_stock IS NULL 
              OR available_stock != (current_stock - COALESCE(reserved_stock, 0))
          operator: ">"
          value: 50  # Only run if there are discrepancies
      type: TRANSFORM
      batchSize: 10000

    - name: identify-reorder-needed
      description: "Mark items needing reorder only when stock is low"
      sql: |
        UPDATE inventory 
        SET needs_reorder = CASE
          WHEN available_stock <= reorder_point THEN true
          ELSE false
        END
        WHERE needs_reorder IS NULL
          OR (available_stock <= reorder_point AND needs_reorder = false)
          OR (available_stock > reorder_point AND needs_reorder = true)
      conditions:
        - query: "SELECT COUNT(*) FROM inventory WHERE available_stock <= reorder_point"
          operator: ">"
          value: 0  # Only run if there are items below reorder point
        - query: "SELECT COUNT(*) FROM inventory WHERE available_stock IS NOT NULL AND reorder_point IS NOT NULL"
          operator: ">"
          value: 100  # Only run if we have enough data to work with
      dependsOn: ["calculate-available-stock"]
      type: TRANSFORM
      batchSize: 15000

